# ═══════════════════════════════════════════════════════════════════════════════
# Revan, the Returned
# ═══════════════════════════════════════════════════════════════════════════════
# Encounter spans 3 floors and 5 phases:
#   Floor 1: Phase 1 (Revan 100%-64%) → Phase 2 (HK-47)
#   Floor 2: Foci Transition → Phase 3 (Revan 64%-28%)
#   Floor 3: Resonance Transition → Phase 4 (Revan 28%-9%) → Phase 5 (Machine Core)
[[boss]]
id = "revan"
name = "Revan"
difficulties = ["story", "veteran"]
is_final_boss = true

# -- Entities --
[[boss.entities]]
name = "Revan"
ids = [3431605855059968]
is_boss = true
triggers_encounter = true
is_kill_target = false    # Core is the actual kill target

[[boss.entities.hp_markers]]
hp_percent = 65.0
label = "HK Arrives"

[[boss.entities.hp_markers]]
hp_percent = 28.0
label = "Floor 3"

[[boss.entities.hp_markers]]
hp_percent = 9.0
label = "Core Burn"

[[boss.entities]]
name = "HK-47"
ids = [3444310368321536]
is_boss = true
is_kill_target = false

[[boss.entities.hp_markers]]
hp_percent = 9.0
label = "HK Pushes"

[[boss.entities]]
name = "Machine Focus"
ids = [3440805675008000]
is_boss = false
is_kill_target = false

[[boss.entities]]
name = "Machine Core"
ids = [3447583133401088]
is_boss = true
is_kill_target = true
# ═══════════════════════════════════════════════════════════════════════════════
# Counters
# ═══════════════════════════════════════════════════════════════════════════════

# Track Machine Focus deaths for Foci phase transition
[[boss.counters]]
id = "foci_deaths"
name = "Foci Deaths"
increment_on = { type = "entity_death", selector = ["Machine Focus"] }
reset_on = { type = "combat_end" }
initial_value = 0

# ═══════════════════════════════════════════════════════════════════════════════
# Phases
# ═══════════════════════════════════════════════════════════════════════════════

# -- Phase 1: First Floor - Revan 100% to 64% --
[[boss.phases]]
id = "revan_p1"
name = "Floor 1 - Revan"
trigger = { type = "combat_start" }

# -- Phase 2: HK-47 --
[[boss.phases]]
id = "revan_hk47"
name = "HK-47"
preceded_by = "revan_p1"
trigger = { type = "boss_hp_below", hp_percent = 65.0, selector = ["Revan"] }

# -- Foci Transition (runs to Floor 2) --
[[boss.phases]]
id = "revan_foci"
name = "Foci"
preceded_by = "revan_hk47"
trigger = { type = "boss_hp_below", hp_percent = 10.0, selector = ["HK-47"] }

# -- Phase 3: Second Floor - Revan 64% to 28% --
# Triggers when all 4 Machine Foci are destroyed
[[boss.phases]]
id = "revan_p3"
name = "Floor 2 - Revan"
trigger = { type = "counter_reaches", counter_id = "foci_deaths", value = 4 }

# -- Resonance Transition (Revan channels for 120s) --
[[boss.phases]]
id = "revan_resonance"
name = "Resonance"
preceded_by = "revan_p3"
trigger = { type = "boss_hp_below", hp_percent = 28.1, selector = ["Revan"] }

# -- Phase 4: Third Floor - Revan 28% to 9% --
# Triggers when Resonance shield effect is removed (interrupted by damage)
[[boss.phases]]
id = "revan_p4"
name = "Floor 3 - Revan"
preceded_by = "revan_resonance"
trigger = { type = "effect_removed", effects = [3447578838433792] }

# -- Phase 5: Burn Phase - Machine Core --
# Triggers when Machine Core spawns (at ~10% Revan HP)
[[boss.phases]]
id = "revan_core"
name = "Core"
preceded_by = "revan_p4"
trigger = { type = "npc_appears", selector = [3447583133401088] }

